  <text x="35" y="48" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" fill="#c19a4f" letter-spacing="1.5">BPTP C BLOCK</text>
  <text x="35" y="65" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#668276">Sector 85, Faridabad &bull; PLOTTED LAYOUT</text>
  
