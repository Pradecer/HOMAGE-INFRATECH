    <rect x="340" y="0" width="100" height="40" rx="3" fill="#2d1e0d" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    <text x="390" y="24" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="rgba(255, 255, 255, 0.2)" text-anchor="middle">PR-1</text>
    <rect x="340" y="60" width="100" height="40" rx="3" fill="#2d1e0d" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    <text x="390" y="84" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="rgba(255, 255, 255, 0.2)" text-anchor="middle">PR-2</text>
    <rect x="340" y="120" width="100" height="40" rx="3" fill="#2d1e0d" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
