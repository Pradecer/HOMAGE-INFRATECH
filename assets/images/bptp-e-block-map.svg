    <rect x="20" y="150" width="90" height="50" rx="4" fill="#1b3b2b" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="65" y="180" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.2)" text-anchor="middle">E-3</text>
    <rect x="390" y="10" width="90" height="50" rx="4" fill="#2d1e0d" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="435" y="40" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.2)" text-anchor="middle">E-4</text>
    <rect x="390" y="80" width="90" height="50" rx="4" fill="#2d1e0d" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
